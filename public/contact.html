<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Internate</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090f;
    --surface: #11111c;
    --surface2: #1a1a2e;
    --border: rgba(255,255,255,0.07);
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 520px;
    width: 100%;
    text-align: center;
  }
  .icon { font-size: 3rem; margin-bottom: 20px; }
  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.6rem;
    margin-bottom: 12px;
  }
  p {
    color: var(--muted);
    font-size: 0.92rem;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .email {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--accent2);
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .email:hover {
    border-color: var(--accent2);
    background: rgba(0,212,170,0.08);
    transform: translateY(-1px);
  }
  .back {
    display: inline-block;
    margin-top: 24px;
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.2s;
  }
  .back:hover { color: var(--text); }
  @media (max-width: 600px) {
    .card { padding: 32px 24px; }
    h1 { font-size: 1.3rem; }
    .email { padding: 12px 18px; font-size: 0.9rem; word-break: break-all; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">💬</div>
  <h1>Nous contacter</h1>
  <p>Une question, une suggestion ou un problème ?<br>N'hésite pas à nous écrire, on répond rapidement !</p>
  <a class="email" href="mailto:gc05122008@gmail.com">✉ gc05122008@gmail.com</a>
  <br>
  <a class="back" href="javascript:window.close()">← Retour</a>
</div>
</body>
</html>

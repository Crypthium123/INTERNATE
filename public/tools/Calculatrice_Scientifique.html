<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculatrice Scientifique — Internate</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .tool-topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 24px;
    background: var(--surface-glass);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }
  .tool-topbar a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    transition: color 0.2s;
  }
  .tool-topbar a:hover { color: var(--text); }
  .tool-topbar .sep { color: var(--border); font-size: 0.7rem; }
  .tool-topbar .current { color: var(--accent); font-size: 0.82rem; font-weight: 600; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 52px 20px 20px;
  }

  .calc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    max-width: 400px;
    width: 100%;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    margin-bottom: 20px;
    text-align: center;
  }

  .display {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    text-align: right;
    font-size: 1.8rem;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    color: var(--accent);
    word-break: break-all;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  button {
    padding: 14px 8px;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.2s;
    font-family: 'Syne', sans-serif;
  }

  button:hover {
    background: var(--overlay-accent);
    border-color: var(--accent);
  }

  button.operator {
    background: var(--overlay-accent-hover);
    color: var(--accent);
    border-color: var(--accent);
  }

  button.operator:hover {
    background: rgba(108,99,255,0.35);
  }

  button.equals {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    grid-column: span 2;
  }

  button.equals:hover {
    background: var(--accent);
  }

  button.clear {
    background: rgba(255,107,107,0.2);
    color: var(--red);
    border-color: var(--red);
    grid-column: span 2;
  }

  button.clear:hover {
    background: rgba(255,107,107,0.35);
  }

  .back-btn {
    width: 100%;
    margin-top: 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .back-btn:hover {
    background: var(--hover-overlay);
  }

  @media (max-width: 768px) {
    body { padding: 52px 12px 12px; }
    .tool-topbar { padding: 10px 16px; font-size: 0.8rem; }
    .tool-topbar a, .tool-topbar .current { font-size: 0.75rem; }
  }
  @media (max-width: 480px) {
    body { padding: 48px 8px 8px; }
    .tool-topbar { padding: 8px 12px; gap: 8px; }
    .tool-topbar a, .tool-topbar .current { font-size: 0.7rem; }
  }
  .loading-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p { color: var(--muted); font-size: 0.85rem; margin-top: 16px; }

  @media (max-width: 400px) {
    .calc { padding: 16px; }
    .display { font-size: 1.4rem; padding: 12px; }
    button { padding: 12px 6px; font-size: 0.8rem; }
    h1 { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p>Chargement...</p>
</div>
<div class="tool-topbar">
  <a href="../dashboard/Connected_internate.html">Internate</a>
  <span class="sep">›</span>
  <a href="../courses/Ressources_ex.html">Cours</a>
  <span class="sep">›</span>
  <span class="current">Calculatrice</span>
  </div>

<div class="calc" id="tool-content">
  <h1>🧮 Calculatrice Scientifique</h1>
  <button onclick="exportPDF('tool-content', 'Calculatrice_Scientifique.pdf')" class="btn btn-secondary" style="padding:6px 14px;font-size:0.8rem;">📄 Exporter en PDF</button>
  <div class="display" id="display">0</div>
  
  <div class="buttons">
    <button onclick="clear()">C</button>
    <button class="operator" onclick="append('(')">( )</button>
    <button class="operator" onclick="append('%')">%</button>
    <button class="operator" onclick="append('/')">/</button>
    
    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('*')">×</button>
    
    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('-')">−</button>
    
    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="operator" onclick="append('+')">+</button>
    
    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="equals" onclick="calculate()">=</button>
    
    <button class="operator" onclick="appendFunc('sqrt')">√</button>
    <button class="operator" onclick="appendFunc('pow')">x²</button>
    <button class="operator" onclick="appendFunc('pow3')">x³</button>
    <button class="operator" onclick="appendFunc('sin')">sin</button>
    
    <button class="operator" onclick="appendFunc('cos')">cos</button>
    <button class="operator" onclick="appendFunc('tan')">tan</button>
    <button class="operator" onclick="appendFunc('log')">log</button>
    <button class="operator" onclick="appendFunc('ln')">ln</button>
    
    <button class="operator" onclick="append('π')" style="grid-column: span 2;">π</button>
    <button class="operator" onclick="append('e')" style="grid-column: span 2;">e</button>
    
    <button class="clear" onclick="backspace()">← Effacer</button>
    <button class="clear" onclick="goBack()">← Retour au dashboard</button>
  </div>
</div>

<script>
let display = document.getElementById('display');
let current = '0';

function updateDisplay() {
  display.textContent = current.substring(0, 30) || '0';
}

function append(char) {
  if (current === '0' && char !== '.') current = '';
  if (char === '*') char = '×';
  if (char === '-' && current.endsWith('(')) char = '−';
  current += char;
  updateDisplay();
}

function appendFunc(func) {
  if (func === 'sqrt') current += '√(';
  else if (func === 'pow') current += '^2';
  else if (func === 'pow3') current += '^3';
  else if (func === 'sin') current += 'sin(';
  else if (func === 'cos') current += 'cos(';
  else if (func === 'tan') current += 'tan(';
  else if (func === 'log') current += 'log(';
  else if (func === 'ln') current += 'ln(';
  updateDisplay();
}

function backspace() {
  current = current.slice(0, -1) || '0';
  updateDisplay();
}

function clear() {
  current = '0';
  updateDisplay();
}

function calculate() {
  try {
    let expr = current
      .replace(/×/g, '*')
      .replace(/−/g, '-')
      .replace(/√\(/g, 'Math.sqrt(')
      .replace(/sin\(/g, 'Math.sin(')
      .replace(/cos\(/g, 'Math.cos(')
      .replace(/tan\(/g, 'Math.tan(')
      .replace(/log\(/g, 'Math.log10(')
      .replace(/ln\(/g, 'Math.log(')
      .replace(/π/g, 'Math.PI')
      .replace(/e/g, 'Math.E')
      .replace(/\^2/g, '**2')
      .replace(/\^3/g, '**3')
      .replace(/\^/g, '**');
    
    const result = eval(expr);
    current = String(result.toFixed(8)).replace(/\.?0+$/, '');
    updateDisplay();
  } catch (e) {
    current = 'Erreur';
    updateDisplay();
    setTimeout(() => { current = '0'; updateDisplay(); }, 1500);
  }
}

function goBack() {
  window.location.href = '../dashboard/Connected_internate.html';
}

document.addEventListener('keydown', (e) => {
  if (e.key >= '0' && e.key <= '9') append(e.key);
  if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') append(e.key);
  if (e.key === '.') append(e.key);
  if (e.key === 'Enter') calculate();
  if (e.key === 'Backspace') backspace();
  if (e.key === 'Escape') clear();
});

const loadingOverlay = document.getElementById('loadingOverlay');
const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
if (user.email) {
  loadingOverlay.classList.add('hidden');
} else {
  window.location.href = '../auth/Login_Internate.html';
}

updateDisplay();
</script>
<div style="text-align:center;padding:16px;font-size:0.75rem;color:var(--muted);margin-top:20px;">
  <a href="../help/" style="color:var(--accent2);text-decoration:none;">💬 Aide & retours</a>
</div>
<script src="../js/theme.js"></script>
<script src="../js/pdf-export.js"></script>
<script>navigator.serviceWorker && navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>

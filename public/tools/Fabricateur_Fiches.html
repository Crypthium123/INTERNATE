<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabricateur de Fiches — Internate</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .tool-topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 24px;
    background: var(--surface-glass);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }
  .tool-topbar a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    transition: color 0.2s;
  }
  .tool-topbar a:hover { color: var(--text); }
  .tool-topbar .sep { color: var(--border); font-size: 0.7rem; }
  .tool-topbar .current { color: var(--accent); font-size: 0.82rem; font-weight: 600; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    padding: 52px 20px 40px;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    margin-bottom: 32px;
  }

  .creator {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 40px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
  }

  label {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input, textarea, select {
    padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
  }

  textarea {
    resize: vertical;
    min-height: 120px;
  }

  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--overlay-accent);
  }

  .color-picker {
    display: flex;
    gap: 8px;
  }

  .color-option {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
  }

  .color-option:hover, .color-option.selected {
    border-color: white;
    transform: scale(1.1);
  }

  .btn {
    padding: 12px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover {
    background: var(--accent);
    transform: translateY(-2px);
  }

  .btn.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn.secondary:hover {
    background: var(--hover-overlay);
  }

  .btn-group {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }

  .fiches-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .fiche {
    aspect-ratio: 3/2;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }

  .fiche:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }

  .fiche-front {
    display: none;
    text-align: center;
    z-index: 1;
  }

  .fiche-back {
    display: flex;
    flex-direction: column;
    z-index: 1;
  }

  .fiche.flipped .fiche-front {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fiche.flipped .fiche-back {
    display: none;
  }

  .fiche-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    margin-bottom: 8px;
  }

  .fiche-subject {
    font-size: 0.75rem;
    opacity: 0.8;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .fiche-content {
    font-size: 0.9rem;
    line-height: 1.4;
    opacity: 0.9;
    flex-grow: 1;
  }

  .fiche-hint {
    font-size: 0.75rem;
    opacity: 0.6;
    margin-top: 12px;
    text-align: center;
  }

  .fiche-delete {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--overlay-red);
    border: none;
    color: var(--red);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.2s;
    z-index: 2;
  }

  .fiche-delete:hover {
    background: var(--overlay-red);
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    margin: 32px 0 16px;
  }

  .export-btn {
    background: linear-gradient(135deg, var(--accent), #00d4aa);
  }

  @media (max-width: 768px) {
    .form-row { grid-template-columns: 1fr; }
    .fiches-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
  }

  @media (max-width: 768px) {
    body { padding: 52px 12px 12px; }
    .tool-topbar { padding: 10px 16px; font-size: 0.8rem; }
    .tool-topbar a, .tool-topbar .current { font-size: 0.75rem; }
  }
  @media (max-width: 480px) {
    body { padding: 48px 8px 8px; }
    .tool-topbar { padding: 8px 12px; gap: 8px; }
    .tool-topbar a, .tool-topbar .current { font-size: 0.7rem; }
  }
  .loading-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p { color: var(--muted); font-size: 0.85rem; margin-top: 16px; }
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p>Chargement...</p>
</div>
<div class="tool-topbar">
  <a href="../dashboard/Connected_internate.html">Internate</a>
  <span class="sep">›</span>
  <a href="../courses/Ressources_ex.html">Cours</a>
  <span class="sep">›</span>
  <span class="current">Fiches</span>
  </div>

<div class="container" id="mainContent">
  <h1>🗂️ Fabricateur de Fiches de Révision</h1>
  <button onclick="exportPDF('mainContent', 'Fabricateur_Fiches.pdf')" class="btn btn-secondary" style="padding:6px 14px;font-size:0.8rem;margin-bottom:12px;">📄 Exporter en PDF</button>
  
  <div class="creator">
    <div class="form-row">
      <div class="form-group">
        <label>Titre de la fiche</label>
        <input type="text" id="ficheName" placeholder="ex: Photosynthèse">
      </div>
      <div class="form-group">
        <label>Matière</label>
        <select id="subject">
          <option>Mathématiques</option>
          <option>Physique</option>
          <option>Chimie</option>
          <option>SVT</option>
          <option>Histoire</option>
          <option>Géographie</option>
          <option>Français</option>
          <option>Anglais</option>
          <option>Espagnol</option>
          <option>Philosophie</option>
          <option>Autre</option>
        </select>
      </div>
      <div class="form-group">
        <label>Couleur</label>
        <div class="color-picker">
          <div class="color-option selected" style="background: #6c63ff;" onclick="selectColor(this, '#6c63ff')"></div>
          <div class="color-option" style="background: #00d4aa;" onclick="selectColor(this, '#00d4aa')"></div>
          <div class="color-option" style="background: #ff6b6b;" onclick="selectColor(this, '#ff6b6b')"></div>
          <div class="color-option" style="background: #ffa94d;" onclick="selectColor(this, '#ffa94d')"></div>
          <div class="color-option" style="background: #a78bfa;" onclick="selectColor(this, '#a78bfa')"></div>
        </div>
      </div>
    </div>
    
    <div class="form-group" style="margin-bottom: 16px;">
      <label>Contenu (recto-verso)</label>
      <textarea id="fichContent" placeholder="Écris ton contenu ici. Utilise | pour séparer recto et verso.&#10;&#10;Exemple:&#10;Recto: Définition du photosynthèse | Verso: Processus de transformation de la lumière en énergie chimique"></textarea>
    </div>
    
    <div class="btn-group">
      <button class="btn" onclick="createFiche()">➕ Créer la fiche</button>
      <button class="btn secondary" onclick="exportAllPDF()">📕 Exporter en PDF</button>
      <button class="btn secondary" onclick="goBack()">← Retour au dashboard</button>
    </div>
  </div>
  
  <div class="section-title">📚 Vos fiches</div>
  <div class="fiches-grid" id="fichesContainer"></div>
</div>

<script>
let fiches = JSON.parse(localStorage.getItem('fiches') || '[]');
let currentColor = '#6c63ff';

function selectColor(el, color) {
  document.querySelectorAll('.color-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  currentColor = color;
}

function createFiche() {
  const name = document.getElementById('ficheName').value;
  const subject = document.getElementById('subject').value;
  const content = document.getElementById('fichContent').value;
  
  if (!name || !content) {
    alert('⚠️ Remplis le titre et le contenu');
    return;
  }
  
  const fiche = {
    id: Date.now(),
    name,
    subject,
    color: currentColor,
    recto: content.includes('|') ? content.split('|')[0].trim() : content,
    verso: content.includes('|') ? content.split('|')[1].trim() : 'Voir recto'
  };
  
  fiches.push(fiche);
  localStorage.setItem('fiches', JSON.stringify(fiches));
  
  document.getElementById('ficheName').value = '';
  document.getElementById('fichContent').value = '';
  renderFiches();
}

function renderFiches() {
  const container = document.getElementById('fichesContainer');
  container.innerHTML = '';
  
  fiches.forEach(fiche => {
    const div = document.createElement('div');
    div.className = 'fiche';
    div.style.background = fiche.color;
    div.style.color = 'white';
    div.innerHTML = `
      <button class="fiche-delete" onclick="deleteFiche(${fiche.id})">✕</button>
      <div class="fiche-back">
        <div class="fiche-subject">${fiche.subject}</div>
        <div class="fiche-title">${fiche.name}</div>
        <div class="fiche-content">${fiche.recto}</div>
        <div class="fiche-hint">Cliquez pour retourner →</div>
      </div>
      <div class="fiche-front">
        <div class="fiche-content">${fiche.verso}</div>
      </div>
    `;
    div.addEventListener('click', (e) => {
      if (!e.target.classList.contains('fiche-delete')) {
        div.classList.toggle('flipped');
      }
    });
    container.appendChild(div);
  });
}

function deleteFiche(id) {
  if (confirm('Supprimer cette fiche ?')) {
    fiches = fiches.filter(f => f.id !== id);
    localStorage.setItem('fiches', JSON.stringify(fiches));
    renderFiches();
  }
}

function exportAllPDF() {
  window.exportPDF('mainContent', 'Fabricateur_Fiches.pdf');
}

function goBack() {
  window.location.href = '../dashboard/Connected_internate.html';
}

function showToast(msg, type) {
  var c = document.getElementById('toastContainer');
  if (!c) return;
  var e = document.createElement('div');
  e.className = 'toast toast-' + (type || 'info');
  e.textContent = msg;
  c.appendChild(e);
  setTimeout(function() {
    e.style.animation = 'toastOut 0.3s ease both';
    setTimeout(function() { e.remove(); }, 300);
  }, 3500);
}
var confirmCallback = null;
function showConfirm(msg, cb) {
  confirmCallback = cb;
  document.getElementById('confirmMessage').textContent = msg;
  document.getElementById('confirmOverlay').classList.add('show');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('show');
  confirmCallback = null;
}
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('confirmBtn');
  if (btn) btn.addEventListener('click', function() {
    if (confirmCallback) confirmCallback();
    closeConfirm();
  });
  var overlay = document.getElementById('confirmOverlay');
  if (overlay) overlay.addEventListener('click', function(e) {
    if (e.target === e.currentTarget) closeConfirm();
  });
});
const loadingOverlay = document.getElementById('loadingOverlay');
const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
if (user.email) {
  loadingOverlay.classList.add('hidden');
} else {
  window.location.href = '../auth/Login_Internate.html';
}

renderFiches();
</script>
<div style="text-align:center;padding:16px;font-size:0.75rem;color:var(--muted);margin-top:20px;">
<div class="toast-container" id="toastContainer"></div>
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmMessage">Confirmer ?</p>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">Annuler</button>
      <button class="btn-confirm" id="confirmBtn">Confirmer</button>
    </div>
  </div>
</div>
  <a href="../help/" style="color:var(--accent2);text-decoration:none;">💬 Aide & retours</a>
</div>

<script src="../js/pdf-export.js"></script>
<script>navigator.serviceWorker && navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>

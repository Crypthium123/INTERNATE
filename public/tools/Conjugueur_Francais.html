const ALL_VERBS = [
  'être','avoir','aller','faire','pouvoir','vouloir','devoir','savoir',
  'venir','dire','voir','prendre','parler','finir',

];

function erStem(v) { return v.slice(0,-2); }
function irStem(v) { return v.slice(0,-2); }
function reStem(v) { return v.slice(0,-2); }

function conjER(verb){
  const s=erStem(verb), pp=s+'é';
  return {
    'Indicatif':{
      'Présent':[s+'e',s+'es',s+'e',s+'ons',s+'ez',s+'ent'],
      'Imparfait':[s+'ais',s+'ais',s+'ait',s+'ions',s+'iez',s+'aient'],
      'Futur simple':[verb+'ai',verb+'as',verb+'a',verb+'ons',verb+'ez',verb+'ont'],
      'Passé simple':[s+'ai',s+'as',s+'a',s+'âmes',s+'âtes',s+'èrent'],
      'Passé composé':['ai '+pp,'as '+pp,'a '+pp,'avons '+pp,'avez '+pp,'ont '+pp]
    },
    'Conditionnel':{'Présent':[verb+'ais',verb+'ais',verb+'ait',verb+'ions',verb+'iez',verb+'aient']},
    'Subjonctif':{'Présent':[s+'e',s+'es',s+'e',s+'ions',s+'iez',s+'ent']}
  };
}

function conjIR(verb){
  const s=irStem(verb), pp=s+'i';
  return {
    'Indicatif':{
      'Présent':[s+'is',s+'is',s+'it',s+'issons',s+'issez',s+'issent'],
      'Imparfait':[s+'issais',s+'issais',s+'issait',s+'issions',s+'issiez',s+'issaient'],
      'Futur simple':[verb+'ai',verb+'as',verb+'a',verb+'ons',verb+'ez',verb+'ont'],
      'Passé simple':[s+'is',s+'is',s+'it',s+'îmes',s+'îtes',s+'irent'],
      'Passé composé':['ai '+pp,'as '+pp,'a '+pp,'avons '+pp,'avez '+pp,'ont '+pp]
    },
    'Conditionnel':{'Présent':[verb+'ais',verb+'ais',verb+'ait',verb+'ions',verb+'iez',verb+'aient']},
    'Subjonctif':{'Présent':[s+'isse',s+'isses',s+'isse',s+'issions',s+'issiez',s+'issent']}
  };
}

function conjRE(verb){
  const s=reStem(verb), fs=verb.slice(0,-1), pp=s+'u';
  return {
    'Indicatif':{
      'Présent':[s+'s',s+'s',s,s+'ons',s+'ez',s+'ent'],
      'Imparfait':[s+'ais',s+'ais',s+'ait',s+'ions',s+'iez',s+'aient'],
      'Futur simple':[fs+'ai',fs+'as',fs+'a',fs+'ons',fs+'ez',fs+'ont'],
      'Passé simple':[s+'is',s+'is',s+'it',s+'îmes',s+'îtes',s+'irent'],
      'Passé composé':['ai '+pp,'as '+pp,'a '+pp,'avons '+pp,'avez '+pp,'ont '+pp]
    },
    'Conditionnel':{'Présent':[fs+'ais',fs+'ais',fs+'ait',fs+'ions',fs+'iez',fs+'aient']},
    'Subjonctif':{'Présent':[s+'e',s+'es',s+'e',s+'ions',s+'iez',s+'ent']}
  };
}

function getType(verb){
  if(HARDCODED[verb]) return HARDCODED[verb].type;
  if(verb.endsWith('er')) return '-er (régulier)';
  if(verb.endsWith('ir')) return '-ir (régulier)';
  if(verb.endsWith('re')) return '-re (régulier)';
  return 'irrégulier';
}

function getConjugations(verb){
  if(HARDCODED[verb]){ const {type,...c}=HARDCODED[verb]; return c; }
  if(verb.endsWith('er')) return conjER(verb);
  if(verb.endsWith('ir')) return conjIR(verb);
  if(verb.endsWith('re')) return conjRE(verb);
  return null;
}

const placeholderEl=document.getElementById('placeholder');
const conjViewEl=document.getElementById('conjugationView');
const searchInput=document.getElementById('searchInput');

function renderVerbList(filter){
  const f=(filter||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const filtered=ALL_VERBS.filter(v=>{
    const vn=v.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    return vn.includes(f);
  });
  verbListEl.innerHTML=filtered.map(v=>
    `<button class="verb-btn${v===selectedVerb?' active':''}" onclick="selectVerb('${v}')">${v}</button>`
  ).join('');
}

function selectVerb(verb){
  selectedVerb=verb;
  renderVerbList(searchInput.value);
  const conj=getConjugations(verb);
  if(!conj){
    conjViewEl.innerHTML='<p class="placeholder">Conjugaisons non disponibles.</p>';
    conjViewEl.style.display='block'; placeholderEl.style.display='none';
    return;
  }
  const type=getType(verb);
  let html=`<div class="conj-header"><h1>${verb}</h1><span class="verb-type">${type}</span></div>`;
  const groups=[
    {label:'Indicatif',modes:['Présent','Imparfait','Futur simple','Passé simple','Passé composé']},
    {label:'Conditionnel',modes:['Présent']},
    {label:'Subjonctif',modes:['Présent']}
  ];
  for(const g of groups){
    const md=conj[g.label];
    if(!md) continue;
    html+=`<div class="tense-section"><h3>${g.label}</h3>`;
    for(const t of g.modes){
      const forms=md[t];
      if(!forms) continue;
      html+=`<h4>${t}</h4><table class="conj-table">`;
      for(let i=0;i<6;i++) html+=`<tr><td class="person">${PERSONS[i]}</td><td class="conjugation">${forms[i]||'—'}</td></tr>`;
      html+='</table>';
    }
    html+='</div>';
  }
  conjViewEl.innerHTML=html;
  conjViewEl.style.display='block';
  placeholderEl.style.display='none';
}

function filterVerbs(){
  if(selectedVerb){
    const f=searchInput.value.toLowerCase();
    if(!ALL_VERBS.some(v=>v===selectedVerb&&v.toLowerCase().includes(f)))
      selectedVerb=null;
  }
  renderVerbList(searchInput.value);
  if(!selectedVerb){ conjViewEl.style.display='none'; placeholderEl.style.display='block'; }
}

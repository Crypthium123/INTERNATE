<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de QCM — Internate</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090f;
    --surface: #11111c;
    --surface2: #1a1a2e;
    --border: rgba(255,255,255,0.07);
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --accent3: #ff6b6b;
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .tool-topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 24px;
    background: rgba(17,17,28,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }
  .tool-topbar a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    transition: color 0.2s;
  }
  .tool-topbar a:hover { color: var(--text); }
  .tool-topbar .sep { color: var(--border); font-size: 0.7rem; }
  .tool-topbar .current { color: var(--accent); font-size: 0.82rem; font-weight: 600; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    padding: 52px 20px 40px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    margin-bottom: 24px;
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    padding: 12px 20px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-weight: 600;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
  }

  .creator, .quiz {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input, textarea {
    width: 100%;
    padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
  }

  .answer-group {
    margin-top: 12px;
    padding: 12px;
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
  }

  .answer-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .answer-row input[type="radio"] {
    width: auto;
    flex-shrink: 0;
  }

  .answer-row input[type="text"] {
    flex: 1;
  }

  button {
    padding: 12px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:hover {
    background: #7c74ff;
    transform: translateY(-2px);
  }

  button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  button.secondary:hover {
    background: rgba(255,255,255,0.05);
  }

  .btn-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .question {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .question-text {
    font-weight: 600;
    margin-bottom: 12px;
  }

  .answer-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    margin: 8px 0;
    background: rgba(255,255,255,0.03);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .answer-option:hover {
    background: rgba(108,99,255,0.1);
  }

  .answer-option input[type="radio"] {
    cursor: pointer;
  }

  .score {
    background: rgba(108,99,255,0.15);
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    font-size: 1.2rem;
    margin-bottom: 16px;
  }

  .score-value {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
  }
</style>
</head>
<body>
<div class="tool-topbar">
  <a href="../dashboard/Connected_internate.html">Internate</a>
  <span class="sep">›</span>
  <a href="../courses/Ressources_ex.html">Cours</a>
  <span class="sep">›</span>
  <span class="current">QCM</span>
</div>

<div class="container">
  <h1>📋 Générateur de QCM</h1>
  
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('create')">➕ Créer</button>
    <button class="tab-btn" onclick="switchTab('play')">🎮 Jouer</button>
  </div>
  
  <!-- TAB: CREATE -->
  <div id="create" class="tab-content active">
    <div class="creator">
      <div class="form-group">
        <label>Titre du QCM</label>
        <input type="text" id="quizTitle" placeholder="ex: QCM Photosynthèse">
      </div>
      
      <div class="form-group">
        <label>Question</label>
        <textarea id="questionText" placeholder="Écris ta question…"></textarea>
      </div>
      
      <div class="form-group">
        <label>Réponses</label>
        <div class="answer-group" id="answersContainer">
          <div class="answer-row">
            <input type="radio" name="correct" checked>
            <input type="text" placeholder="Réponse 1 (correcte)">
          </div>
          <div class="answer-row">
            <input type="radio" name="correct">
            <input type="text" placeholder="Réponse 2">
          </div>
          <div class="answer-row">
            <input type="radio" name="correct">
            <input type="text" placeholder="Réponse 3">
          </div>
          <div class="answer-row">
            <input type="radio" name="correct">
            <input type="text" placeholder="Réponse 4">
          </div>
        </div>
        <button class="secondary" style="margin-top: 8px; width: 100%;" onclick="addAnswerField()">+ Ajouter une réponse</button>
      </div>
      
      <div class="btn-group">
        <button onclick="addQuestion()">✅ Ajouter la question</button>
        <button class="secondary" onclick="finishQuiz()">🎯 Terminer et jouer</button>
        <button class="secondary" onclick="goBack()">← Retour au dashboard</button>
      </div>
    </div>
  </div>
  
  <!-- TAB: PLAY -->
  <div id="play" class="tab-content">
    <div class="quiz" id="quizContainer">
      <p style="color: var(--muted);">Créez un QCM d'abord pour jouer</p>
    </div>
  </div>
</div>

<script>
let quiz = { title: '', questions: [] };
let currentQuestion = 0;
let score = 0;

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
  
  if (tab === 'play') startQuiz();
}

function addAnswerField() {
  const container = document.getElementById('answersContainer');
  const div = document.createElement('div');
  div.className = 'answer-row';
  div.innerHTML = `
    <input type="radio" name="correct">
    <input type="text" placeholder="Nouvelle réponse">
  `;
  container.appendChild(div);
}

function addQuestion() {
  const title = document.getElementById('quizTitle').value;
  const text = document.getElementById('questionText').value;
  const rows = document.querySelectorAll('#answersContainer .answer-row');
  
  if (!title || !text || rows.length < 2) {
    alert('⚠️ Remplis le titre, la question et ajoute au moins 2 réponses');
    return;
  }
  
  quiz.title = title;
  
  const answers = [];
  let correctIdx = -1;
  rows.forEach((row, idx) => {
    const input = row.querySelector('input[type="text"]');
    const isCorrect = row.querySelector('input[type="radio"]:checked') === row.querySelector('input[type="radio"]');
    if (input.value) {
      answers.push({ text: input.value, correct: isCorrect });
      if (isCorrect) correctIdx = answers.length - 1;
    }
  });
  
  if (correctIdx === -1) {
    alert('⚠️ Marque une réponse correcte');
    return;
  }
  
  quiz.questions.push({ text, answers });
  
  document.getElementById('questionText').value = '';
  document.getElementById('answersContainer').innerHTML = `
    <div class="answer-row">
      <input type="radio" name="correct" checked>
      <input type="text" placeholder="Réponse 1 (correcte)">
    </div>
    <div class="answer-row">
      <input type="radio" name="correct">
      <input type="text" placeholder="Réponse 2">
    </div>
    <div class="answer-row">
      <input type="radio" name="correct">
      <input type="text" placeholder="Réponse 3">
    </div>
    <div class="answer-row">
      <input type="radio" name="correct">
      <input type="text" placeholder="Réponse 4">
    </div>
  `;
  
  alert(`✅ Question ${quiz.questions.length} ajoutée !`);
}

function finishQuiz() {
  if (quiz.questions.length === 0) {
    alert('Ajoute au moins une question');
    return;
  }
  currentQuestion = 0;
  score = 0;
  switchTab('play');
}

function startQuiz() {
  if (quiz.questions.length === 0) return;
  
  displayQuestion();
}

function displayQuestion() {
  const q = quiz.questions[currentQuestion];
  const container = document.getElementById('quizContainer');
  
  if (currentQuestion >= quiz.questions.length) {
    container.innerHTML = `
      <div class="score">
        <div>Score final</div>
        <div class="score-value">${score}/${quiz.questions.length}</div>
        <div style="margin-top: 16px; color: var(--accent2); font-size: 1.1rem;">${Math.round(score / quiz.questions.length * 100)}%</div>
      </div>
      <button onclick="switchTab('create')">← Retour à l'éditeur</button>
      <button class="secondary" onclick="goBack()">← Retour au dashboard</button>
    `;
    return;
  }
  
  let html = `
    <div style="margin-bottom: 16px; color: var(--muted); font-size: 0.9rem;">
      Question ${currentQuestion + 1}/${quiz.questions.length}
    </div>
    <div class="question-text">${q.text}</div>
  `;
  
  q.answers.forEach((ans, idx) => {
    html += `
      <label class="answer-option">
        <input type="radio" name="answer" value="${idx}">
        <span>${ans.text}</span>
      </label>
    `;
  });
  
  html += `
    <div class="btn-group" style="margin-top: 24px;">
      <button onclick="checkAnswer()">✅ Valider</button>
    </div>
  `;
  
  container.innerHTML = html;
}

function checkAnswer() {
  const selected = document.querySelector('input[name="answer"]:checked');
  if (!selected) {
    alert('Sélectionne une réponse');
    return;
  }
  
  const q = quiz.questions[currentQuestion];
  if (q.answers[selected.value].correct) {
    score++;
  }
  
  currentQuestion++;
  displayQuestion();
}

function goBack() {
  window.location.href = '../dashboard/Connected_internate.html';
}

// Auth check
const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
if (!user.email) window.location.href = '../auth/Login_Internate.html';
</script>
<div style="text-align:center;padding:16px;font-size:0.75rem;color:var(--muted);margin-top:20px;">
  Des retours ? <a href="mailto:gc05122008@gmail.com" style="color:var(--accent2);text-decoration:none;">gc05122008@gmail.com</a>
</div>
</body>
</html>

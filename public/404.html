<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Internate</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .container {
    text-align: center;
    max-width: 480px;
  }
  .code {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 8rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.6rem;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }
  p {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.7;
    margin-bottom: 32px;
  }
  .btn {
    display: inline-block;
    padding: 14px 32px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: 600;
    transition: all 0.25s;
  }
  .btn:hover {
    background: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(108,99,255,0.4);
  }
  .btn-outline {
    display: inline-block;
    margin-top: 12px;
    margin-left: 8px;
    padding: 14px 32px;
    background: transparent;
    color: var(--text);
    text-decoration: none;
    border: 1px solid var(--border2);
    border-radius: 10px;
    font-weight: 500;
    transition: all 0.25s;
  }
  .btn-outline:hover {
    border-color: var(--border2);
    background: var(--hover-overlay);
  }
  .orb {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    pointer-events: none;
    z-index: -1;
  }
  .orb-1 {
    top: -200px; left: -200px;
    background: radial-gradient(circle, var(--overlay-accent), transparent 70%);
  }
  .orb-2 {
    bottom: -200px; right: -200px;
    background: radial-gradient(circle, var(--overlay-green), transparent 70%);
  }
  @media (max-width: 480px) {
    .code { font-size: 5rem; }
    h1 { font-size: 1.3rem; }
    .btn, .btn-outline { display: block; margin: 12px auto; width: 100%; }
  }

</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="container">
    <div class="code">404</div>
    <h1>Page introuvable</h1>
    <p>Cette page n'existe pas ou a été déplacée. Vérifie l'URL ou retourne à l'accueil.</p>
    <a href="/" class="btn">Accueil</a>
    <a href="/auth/Login_Internate.html" class="btn-outline">Connexion</a>
  </div>
<script src="js/theme.js"></script>
<script src="js/analytics.js"></script>
<script>navigator.serviceWorker && navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>

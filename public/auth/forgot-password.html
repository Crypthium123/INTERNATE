<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#07070e">
<title>Mot de passe oublié — Internate</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
:root{--form-w:400px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:float 20s ease-in-out infinite}
.orb-1{width:400px;height:400px;background:var(--overlay-accent);top:-80px;left:-80px}
.orb-2{width:300px;height:300px;background:var(--overlay-green);bottom:-60px;right:-60px;animation-delay:-7s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.05)}66%{transform:translate(-20px,20px) scale(0.95)}}
.card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px 40px;width:var(--form-w);max-width:92vw;animation:fadeUp 0.6s ease both}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;text-align:center;letter-spacing:-0.03em;background:var(--gen-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.logo span{font-weight:400;-webkit-text-fill-color:rgba(255,255,255,0.4)}
h1{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:8px;letter-spacing:-0.02em}
.sub{font-size:0.85rem;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:32px}
.form-group{margin-bottom:20px}
label{display:block;font-size:0.78rem;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px}
input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:0.92rem;font-family:'DM Sans',sans-serif;transition:border-color 0.2s}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.15)}
input::placeholder{color:var(--muted)}
.btn-submit{width:100%;padding:13px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:0.92rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow-btn);margin-top:4px}
.btn-submit:hover{box-shadow:var(--shadow-btn-hover);transform:translateY(-1px)}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.result{margin-top:20px;padding:12px 16px;border-radius:10px;font-size:0.85rem;line-height:1.5;display:none}
.result.success{display:block;background:var(--overlay-green);border:1px solid rgba(0,212,170,0.2);color:var(--accent2)}
.result.error{display:block;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);color:#ff6b6b}
.back-link{display:block;text-align:center;margin-top:24px;font-size:0.82rem;color:var(--muted);text-decoration:none;transition:color 0.2s}
.back-link:hover{color:var(--accent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.card{padding:32px 24px 28px}h1{font-size:1.1rem}.sub{font-size:0.8rem;margin-bottom:24px}}
@media(max-width:400px){.card{padding:24px 16px}}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="card">
<div class="logo">Inter<span>nate</span></div>
<h1>Mot de passe oublié</h1>
<p class="sub">Saisis ton adresse email et reçois un lien pour réinitialiser ton mot de passe.</p>
<form id="resetForm" onsubmit="handleReset(event)">
<div class="form-group">
<label for="email">Adresse email</label>
<input type="email" id="email" placeholder="exemple@email.com" required autocomplete="email">
</div>
<button type="submit" class="btn-submit" id="submitBtn">Envoyer le lien</button>
</form>
<div id="result" class="result"></div>
<a href="Login_Internate.html" class="back-link">← Retour à la connexion</a>
</div>
<script type="module" src="/js/firebase-config.js"></script>
<script type="module">
function escapeHtml(str) {
  if (!str && str !== 0) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(String(str)));
  return d.innerHTML;
}
window.handleReset = function(e) {
  e.preventDefault();
  var email = document.getElementById('email').value.trim();
  var btn = document.getElementById('submitBtn');
  var result = document.getElementById('result');
  result.className = 'result';
  result.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Envoi en cours…';
  auth.sendPasswordResetEmail(email).then(function() {
    result.className = 'result success';
    result.style.display = 'block';
    result.innerHTML = '✅ Un email de réinitialisation a été envoyé à <strong>' + escapeHtml(email) + '</strong>.<br>Vérifie ta boîte de réception et tes spams.';
    btn.textContent = 'Lien envoyé ✓';
    document.getElementById('resetForm').style.display = 'none';
  }).catch(function(err) {
    result.className = 'result error';
    result.style.display = 'block';
    var msg = err.message;
    if (msg.includes('user-not-found')) msg = 'Aucun compte trouvé avec cet email.';
    else if (msg.includes('invalid-email')) msg = 'Email invalide.';
    else if (msg.includes('too-many-requests')) msg = 'Trop de tentatives. Réessaie dans quelques minutes.';
    result.textContent = '❌ ' + msg;
    btn.disabled = false;
    btn.textContent = 'Envoyer le lien';
  });
};
</script>
</body>
</html>

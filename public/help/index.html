<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aide — Internate</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 520px;
    width: 100%;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .icon { font-size: 3rem; margin-bottom: 16px; }
  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.6rem;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }
  p {
    color: var(--text2);
    font-size: 0.92rem;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    border: none;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
    box-shadow: var(--shadow-btn);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-btn-hover);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid var(--border);
    margin-top: 12px;
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.1);
  }
  .links { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .back { margin-top: 28px; display: block; color: var(--muted); font-size: 0.82rem; text-decoration: none; }
  .back:hover { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <div class="icon">💬</div>
  <h1>Centre d'aide</h1>
  <p>Un bug, une suggestion ou juste une question ?<br>On est là pour ça.</p>
  <div class="links">
    <a href="https://forms.gle/KzNnZrZNkXEyJFV16" target="_blank" rel="noopener" class="btn btn-primary">
      ✍️ Envoyer un retour
    </a>
    <a href="mailto:gc05122008@gmail.com?subject=Internate%20-%20Demande%20d'aide" class="btn btn-secondary">
      📧 Nous écrire directement
    </a>
  </div>
  <a href="../index.html" class="back">← Retour à l'accueil</a>
</div>
<script src="../js/theme.js"></script>
<script src="../js/analytics.js"></script>
<script>navigator.serviceWorker && navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
